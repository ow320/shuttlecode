<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Badminton Pro Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame">
    <main class="app-screen" id="app-screen"></main>

    <nav class="bottom-nav">
      <button class="nav-item" data-nav="overview">
        <span class="nav-item__icon">🏠</span>
        <span class="nav-item__label">Overview</span>
      </button>
      <button class="nav-item" data-nav="training">
        <span class="nav-item__icon">🏸</span>
        <span class="nav-item__label">Training</span>
      </button>
      <button class="nav-item" data-nav="settings">
        <span class="nav-item__icon">⚙️</span>
        <span class="nav-item__label">Settings</span>
      </button>
    </nav>

    <div class="timer-overlay" id="timer-overlay">
      <div class="timer-overlay__panel">
        <button class="timer-close" id="timer-close">✕</button>
        <div id="timer-body"></div>
      </div>
    </div>

    <div class="timer-overlay" id="drill-form-overlay">
      <div class="timer-overlay__panel">
        <button class="timer-close" id="drill-form-close">✕</button>
        <div id="drill-form-body"></div>
      </div>
    </div>

    <div class="toast-host" id="toast-host"></div>

    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <div class="confirm-box__message" id="confirm-message"></div>
        <div class="confirm-box__actions">
          <button class="confirm-box__btn confirm-box__btn--cancel" id="confirm-cancel">Cancel</button>
          <button class="confirm-box__btn confirm-box__btn--ok" id="confirm-ok">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
